name: claude

ddev_version_constraint: '>= v1.24.0'

project_files:
  - docker-compose.claude.yaml
  - config.claude.yaml
  - claude/Dockerfile.claude
  - claude/scripts/entrypoint.sh
  - commands/claude/claude
  - commands/claude/claude-figma

post_install_actions:
  - |
    #ddev-description: Rendre les commandes et l'entrypoint executables
    chmod +x commands/claude/claude commands/claude/claude-figma claude/scripts/entrypoint.sh
  - |
    #ddev-description: Creer le repertoire de config partagee si absent
    mkdir -p ~/.ddev/claude
    touch ~/.ddev/claude/.credentials.json
    [ -s ~/.ddev/claude/.claude.json ] || printf '{}' > ~/.ddev/claude/.claude.json
  - |
    #ddev-description: Message de prise en main
    echo ""
    echo "Add-on 'claude' installe."
    echo "  1) ddev restart   # construit l'image et demarre le service"
    echo "  2) ddev claude    # au 1er lancement : /login pour t'authentifier"
    echo "  Config partagee : ~/.ddev/claude/ (une seule auth pour tous les projets)"
    echo ""

removal_actions:
  - |
    #ddev-description: Info sur la config partagee
    echo "La config partagee ~/.ddev/claude/ (credentials OAuth) n'est pas"
    echo "supprimee automatiquement. Pour la retirer :"
    echo "  rm -rf ~/.ddev/claude/"
