#ddev-generated
# Service dedie "claude" : conteneur outil sans routage HTTP.
#
# Auth OAuth : les credentials de l'hote (~/.claude/) sont copies dans
# ~/.ddev/claude/ par le hook pre-start, puis montes en tant que
# repertoire. Le mount repertoire (vs fichier individuel) est necessaire
# pour que les ecritures atomiques de Claude Code (rename) fonctionnent.
# CLAUDE_CONFIG_DIR pointe sur ce repertoire -> coherence des chemins.

services:
  claude:
    container_name: ddev-${DDEV_SITENAME}-claude
    build:
      context: claude
      dockerfile: Dockerfile.claude
      args:
        USERNAME: claude
        USER_UID: ${DDEV_UID:-1000}
        USER_GID: ${DDEV_GID:-1000}
    restart: "no"
    environment:
      - HOME=/home/claude
      - CLAUDE_CONFIG_DIR=/home/claude/.claude
    volumes:
      - "../:/var/www/html"
      - ".:/mnt/ddev_config"
      # Config Claude Code : repertoire partage entre tous les projets DDEV.
      # Seede depuis ~/.claude de l'hote par le hook pre-start.
      - "${HOME}/.ddev/claude:/home/claude/.claude"
    labels:
      com.ddev.site-name: ${DDEV_SITENAME}
      com.ddev.approot: $DDEV_APPROOT
