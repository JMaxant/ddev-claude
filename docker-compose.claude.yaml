# ddev-generated
# Service dedie "claude" : conteneur outil sans routage HTTP.
# - L'image embarque un utilisateur dont l'UID/GID = celui de l'hote, injecte
#   au build via les args USER_UID/USER_GID (DDEV expose DDEV_UID/DDEV_GID).
#   Pas besoin de `user:` ni de `group_add` au runtime : l'utilisateur est deja
#   le bon par construction.
# - Monte le code projet (meme chemin que le conteneur web : /var/www/html).
#   NB : un service custom ne recoit PAS ce mount automatiquement -> declare ici.
# - Persiste ~/.claude (auth OAuth, hook RTK, settings perso) dans un volume
#   nomme PAR PROJET (survit aux restart/stop ; nettoye au `ddev delete`).

services:
  claude:
    container_name: ddev-${DDEV_SITENAME}-claude
    image: ddev-${DDEV_SITENAME}-claude
    build:
      context: claude
      dockerfile: Dockerfile.claude
      args:
        USERNAME: claude
        USER_UID: ${DDEV_UID:-1000}
        USER_GID: ${DDEV_GID:-1000}
    command: ["tail", "-f", "/dev/null"]
    restart: "no"
    environment:
      - HOME=/home/claude
      # Si .ddev/.env.claude definit ANTHROPIC_API_KEY, DDEV l'injecte ici
      # automatiquement (alternative a OAuth ; cf. README).
    volumes:
      # Code projet : meme bind-mount que le conteneur web.
      - "../:/var/www/html"
      # Persistance config/auth Claude Code, par projet.
      - "claude-config:/home/claude/.claude"
    labels:
      com.ddev.site-name: ${DDEV_SITENAME}
      com.ddev.approot: $DDEV_APPROOT

volumes:
  claude-config:
    name: "ddev-${DDEV_SITENAME}-claude-config"