name: claude

# Service additionnel + commandes : nécessite une version DDEV récente.
ddev_version_constraint: '>= v1.24.0'

project_files:
  - docker-compose.claude.yaml
  - config.claude.yaml
  - claude/Dockerfile.claude
  - claude/scripts/rtk-autoinit.sh
  - commands/claude/claude

# Pas de global_files : tout est par projet (service, volume, commandes).

post_install_actions:
  - |
    #ddev-description:
    echo ""
    echo "✅ Add-on 'claude' installé."
    echo "   1) ddev restart   # construit l'image, démarre le service, câble RTK"
    echo "   2) ddev claude    # au 1er lancement : /login pour t'authentifier (OAuth)"
    echo ""

removal_actions:
  - |
    #ddev-description: Rappel sur le volume de config Claude
    echo "Le volume 'ddev-${DDEV_SITENAME}-claude-config' (auth + config) n'est pas"
    echo "supprimé automatiquement. Pour le retirer :"
    echo "  docker volume rm ddev-${DDEV_SITENAME}-claude-config"